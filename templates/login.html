<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login · Narrative Intelligence</title>
  <style>
    :root{
      --bg:#0a0e14; --panel:#121821; --line:#1f2a37; --txt:#e6edf3;
      --muted:#8b98a8; --accent:#00e5a0; --danger:#ff5d6c;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);
      color:var(--txt);min-height:100vh;display:flex;align-items:center;
      justify-content:center;
      background-image:radial-gradient(circle at 20% 20%,rgba(0,229,160,.08),transparent 40%),
                       radial-gradient(circle at 80% 80%,rgba(0,140,255,.08),transparent 40%);
    }
    .card{
      width:360px;background:var(--panel);border:1px solid var(--line);
      border-radius:14px;padding:32px 28px;box-shadow:0 20px 60px rgba(0,0,0,.5);
    }
    .logo{font-size:13px;letter-spacing:2px;color:var(--accent);
      text-transform:uppercase;font-weight:700;margin-bottom:6px}
    h1{font-size:20px;margin-bottom:4px}
    .sub{color:var(--muted);font-size:13px;margin-bottom:24px}
    label{display:block;font-size:12px;color:var(--muted);margin:14px 0 6px;
      text-transform:uppercase;letter-spacing:.5px}
    input{
      width:100%;padding:11px 13px;background:#0d1218;border:1px solid var(--line);
      border-radius:8px;color:var(--txt);font-size:14px;outline:none;
    }
    input:focus{border-color:var(--accent)}
    button{
      width:100%;margin-top:22px;padding:12px;background:var(--accent);
      color:#04130d;border:none;border-radius:8px;font-weight:700;font-size:14px;
      cursor:pointer;text-transform:uppercase;letter-spacing:1px;
    }
    button:hover{filter:brightness(1.08)}
    .err{margin-top:16px;padding:10px 12px;background:rgba(255,93,108,.12);
      border:1px solid rgba(255,93,108,.4);border-radius:8px;color:var(--danger);
      font-size:13px}
    .foot{margin-top:20px;text-align:center;color:var(--muted);font-size:11px}
  </style>
</head>
<body>
  <form class="card" method="POST">
    <div class="logo">● Narrative Intelligence</div>
    <h1>🧠 Narrative Intelligence</h1>
    <div class="sub">AAP Punjab · War Room Access</div>

    <label for="username">Username</label>
    <input id="username" name="username" autocomplete="username" autofocus required />

    <label for="password">Password</label>
    <input id="password" name="password" type="password"
           autocomplete="current-password" required />

    <button type="submit">Sign In →</button>

    {% if error %}<div class="err">{{ error }}</div>{% endif %}

    <div class="foot">Authorized personnel only</div>
  </form>
</body>
</html>
